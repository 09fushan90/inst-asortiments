<!-- Firebase SDK -->

<script>
// Firebase конфігурація
const firebaseConfig = {
  apiKey: "AIzaSyCPEYu_S1qn9dwCkh22QzyX4-hB4_ecM0A",
  authDomain: "vesinya-pratsya-shop.firebaseapp.com",
  databaseURL: "https://vesinya-pratsya-shop-default-rtdb.firebaseio.com",
  projectId: "vesinya-pratsya-shop",
  storageBucket: "vesinya-pratsya-shop.firebasestorage.app",
  messagingSenderId: "352467558248",
  appId: "1:352467558248:web:fd2c80d6be6d837cff80dd",
  measurementId: "G-NMM6FYEYT8"
};

// Ініціалізація Firebase
firebase.initializeApp(firebaseConfig);
firebase.analytics();
const db = firebase.database();
const storage = firebase.storage();

// Падаюче листя
function createLeaf(){
  const leaf = document.createElement('div');
  leaf.className = 'leaf';
  leaf.style.left = Math.random() * window.innerWidth + 'px';
  leaf.style.fontSize = 12 + Math.random() * 24 + 'px';
  leaf.style.animationDuration = 5 + Math.random() * 5 + 's';
  leaf.innerHTML = '🍃';

  document.body.appendChild(leaf);

  // Видалення коли долетить до низу
  leaf.addEventListener("animationend", () => {
    leaf.remove();
  });
}
setInterval(createLeaf,500);

// Магазин
let adminMode=false;
let editingId=null;
let products = [];
let categories = [];
let currentProductId = null;
let currentImages = [];
let currentIndex = 0;

// Слухаємо Firebase
async function loadData(){

  const productsSnap = await db.ref("products").get();
  products = productsSnap.val() || [];

  const categoriesSnap = await db.ref("categories").get();
  categories = categoriesSnap.val() || [];

  populateCategorySelects();
  syncCartWithProducts();
  renderProducts();

  hideLoader();
}

loadData();

function saveToDatabase(){
  db.ref('products').set(products);
  db.ref('categories').set(categories);
}
function hideLoader(){
  document.getElementById("loader").classList.add("hide");
}


// Категорії
function populateCategorySelects(){
  const editCat=document.getElementById("editCategory");
  const filterCat=document.getElementById("categoryFilter");
  editCat.innerHTML="<option value=''>Без категорії</option>";
  filterCat.innerHTML="<option value=''>Всі категорії</option>";
  categories.forEach(cat=>{
    editCat.innerHTML+=`<option value="${cat}">${cat}</option>`;
    filterCat.innerHTML+=`<option value="${cat}">${cat}</option>`;
  });
  populateCategoryList();
}

function orderProduct(id){
  addToCart(id);
  showAddedToCart();
}

function quickOrderProduct(title, price){
  const url = `https://t.me/Fushan90?text=${encodeURIComponent(`Хочу замовити ${title} за ${price} грн`)}`;
  window.open(url, "_blank");
}

function showAddedToCart(){
  const btn = document.getElementById("orderSelectedBtn");
  btn.animate([
    { transform: "scale(1)" },
    { transform: "scale(1.12)" },
    { transform: "scale(1)" }
  ], { duration: 250 });
}


function handleSearch(){
  let value=document.getElementById("searchInput").value.toLowerCase();
  if(value==="0990"){
    adminMode=true;
    document.getElementById("addProductBtn").style.display="inline-block";
    document.getElementById("manageCategoriesBtn").style.display="inline-block";
    renderProducts();
    return;
  }
  adminMode=false;
  document.getElementById("addProductBtn").style.display="none";
  document.getElementById("manageCategoriesBtn").style.display="none";
  let filtered=products.filter(p=>p.title.toLowerCase().includes(value));
  renderProducts(filtered);
}

function filterCategory(){
  const cat=document.getElementById("categoryFilter").value;
  if(!cat){renderProducts(); return;}
  renderProducts(products.filter(p=>p.category===cat));
}

function closeModal(){
  document.getElementById("viewModal").style.display = "none";
  document.getElementById("fullscreenViewer").style.display = "none";
  document.body.classList.remove("no-scroll");
}
function openAddModal(){editingId=null;document.getElementById("editTitleText").innerText="Додати товар";document.getElementById("editTitle").value="";document.getElementById("editPrice").value="";document.getElementById("editImageFile").value="";document.getElementById("editDesc").value="";document.getElementById("editCategory").value="";document.getElementById("deleteBtn").style.display="none";document.getElementById("editModal").style.display="flex";}
function openEditModal(id){let p=products.find(x=>x.id===id);editingId=id;document.getElementById("editTitleText").innerText="Редагувати товар";document.getElementById("editTitle").value=p.title;document.getElementById("editPrice").value=p.price;document.getElementById("editDesc").value=p.desc;document.getElementById("editCategory").value=p.category||"";document.getElementById("editImageFile").value="";document.getElementById("deleteBtn").style.display="block";document.getElementById("editModal").style.display="flex";}
function closeEditModal(){document.getElementById("editModal").style.display="none";}
function saveProduct(){let title=document.getElementById("editTitle").value;let price=document.getElementById("editPrice").value;let desc=document.getElementById("editDesc").value;let category=document.getElementById("editCategory").value;let fileInput=document.getElementById("editImageFile");if(!title||!price||!desc)return alert("Заповніть всі поля");if(fileInput.files && fileInput.files[0]){let reader=new FileReader();reader.onload=function(e){saveProductData(title,price,desc,category,e.target.result);};reader.readAsDataURL(fileInput.files[0]);}else{let existingImage=null;if(editingId){existingImage=products.find(x=>x.id===editingId).image;}saveProductData(title,price,desc,category,existingImage);}}
function saveProductData(title,price,desc,category,image){if(editingId){let p=products.find(x=>x.id===editingId);p.title=title;p.price=price;p.desc=desc;p.category=category;p.image=image;}else{products.push({id:Date.now(),title,price,desc,image,category});}saveToDatabase();closeEditModal();renderProducts();}
function deleteProduct(){if(editingId){if(confirm("Ви впевнені, що хочете видалити цей товар?")){products=products.filter(p=>p.id!==editingId);saveToDatabase();renderProducts();closeEditModal();}}}

// Категорії
function openCategoryModal(){document.getElementById("categoryModal").style.display="flex";}
function closeCategoryModal(){document.getElementById("categoryModal").style.display="none";}
function populateCategoryList(){let list=document.getElementById("categoryList");list.innerHTML="";categories.forEach(cat=>{list.innerHTML+=`<div>${cat} <button onclick="removeCategory('${cat}')">Видалити</button></div>`;});}
function addCategory(){let cat=document.getElementById("newCategory").value.trim();if(!cat)return;if(!categories.includes(cat))categories.push(cat);document.getElementById("newCategory").value="";saveToDatabase();}

// Массив временных фото для редактирования

function nextImage(){
  if(currentImages.length < 2) return;
  currentIndex++;
  if(currentIndex >= currentImages.length) currentIndex = 0;
  document.getElementById("modalImg").src = currentImages[currentIndex];
}

function prevImage(){
  if(currentImages.length < 2) return;
  currentIndex--;
  if(currentIndex < 0) currentIndex = currentImages.length - 1;
  document.getElementById("modalImg").src = currentImages[currentIndex];
}

// Работа с фото в форме редактирования / добавления
const addImageBtn = document.getElementById("addImageBtn");
const fileInput = document.getElementById("editImageFile");
const container = document.getElementById("imageUploadContainer");

addImageBtn.onclick = () => fileInput.click();

fileInput.onchange = () => {
  const files = Array.from(fileInput.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      tempImages.push(e.target.result);
      renderTempImages();
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = "";
}

// Отрисовка превью фото
function renderTempImages(){
  container.querySelectorAll(".tempImg").forEach(el => el.remove());

  tempImages.forEach((src, index) => {
    const div = document.createElement("div");
    div.className = "tempImg";
    div.style.position = "relative";
    div.style.width = "60px";
    div.style.height = "60px";
    div.style.border = "1px solid #90ee90";
    div.style.backgroundImage = `url(${src})`;
    div.style.backgroundSize = "cover";
    div.style.backgroundPosition = "center";
    div.style.cursor = "pointer";

    const del = document.createElement("div");
    del.innerText = "×";
    del.style.position = "absolute";
    del.style.top = "0";
    del.style.right = "0";
    del.style.background = "red";
    del.style.color = "white";
    del.style.width = "18px";
    del.style.height = "18px";
    del.style.fontSize = "14px";
    del.style.display = "flex";
    del.style.justifyContent = "center";
    del.style.alignItems = "center";
    del.style.cursor = "pointer";
    del.onclick = (e) => {
      e.stopPropagation();
      tempImages.splice(index, 1);
      renderTempImages();
    };
    div.appendChild(del);
    container.insertBefore(div, addImageBtn);
  });
}

// Открытие модалки "редактировать товар"
function openEditModal(id){
  let p = products.find(x=>x.id===id);
  editingId=id;
  document.getElementById("editTitleText").innerText="Редагувати товар";
  document.getElementById("editTitle").value=p.title;
  document.getElementById("editPrice").value=p.price;
  document.getElementById("editDesc").value=p.desc;
  document.getElementById("editCategory").value=p.category||"";
  tempImages = Array.isArray(p.image) ? [...p.image] : (p.image ? [p.image] : []);
  renderTempImages();
  document.getElementById("deleteBtn").style.display="block";

}

// Сохранение товара
function saveProduct(){
  let title = document.getElementById("editTitle").value;
  let price = document.getElementById("editPrice").value;
  let desc = document.getElementById("editDesc").value;
  let category = document.getElementById("editCategory").value;

  let imageUrl = document.getElementById("editImageUrl").value
    .split("\n")
    .map(x => x.trim())
    .filter(x => x);

  if(!title || !price || !desc) return alert("Заповніть всі поля");

  let images = tempImages.length > 0 
    ? [...tempImages] 
    : imageUrl.length > 0 
      ? imageUrl 
      : (editingId ? products.find(x=>x.id===editingId).image : []);

  saveProductData(title, price, desc, category, images);
}

// saveProductData с массивом изображений
function saveProductData(title, price, desc, category, images){
  if(editingId){
    let p = products.find(x => x.id === editingId);
    p.title = title;
    p.price = price;
    p.desc = desc;
    p.category = category;
    p.image = Array.isArray(images) ? images : [images];
  } else {
    products.push({
      id: Date.now(),
      title,
      price,
      desc,
      category,
      image: Array.isArray(images) ? images : [images]
    });
  }
  saveToDatabase();
  closeEditModal();
  renderProducts();
}

/// масив товарів у кошику
const CART_STORAGE_KEY = 'inst_asortiments_cart';
let selectedProducts = loadCartFromStorage();
updateSelectedUI();

function loadCartFromStorage(){
  try {
    const savedCart = localStorage.getItem(CART_STORAGE_KEY);
    if(!savedCart) return [];
    const parsed = JSON.parse(savedCart);
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    console.error('Не вдалося завантажити кошик', error);
    return [];
  }
}

function saveCartToStorage(){
  try {
    localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(selectedProducts));
  } catch (error) {
    console.error('Не вдалося зберегти кошик', error);
  }
}

function syncCartWithProducts(){
  selectedProducts = selectedProducts
    .map(cartItem => {
      const product = products.find(p => String(p.id) === String(cartItem.id));
      if(!product) return null;
      return {
        ...product,
        quantity: Number(cartItem.quantity) > 0 ? Number(cartItem.quantity) : 1
      };
    })
    .filter(Boolean);

  saveCartToStorage();
  updateSelectedUI();
}

function addToCart(id) {
  const existing = selectedProducts.find(x => String(x.id) === String(id));
  const productDiv = document.querySelector(`.product[data-id='${id}']`);

  if(existing){
    existing.quantity += 1;
  } else {
    const p = products.find(x => String(x.id) === String(id));
    if(!p) return;
    selectedProducts.push({...p, quantity:1});
    if(productDiv) productDiv.classList.add('selected');
  }

  saveCartToStorage();
  updateSelectedUI();
}

function removeFromCart(id, rerenderCart = false) {
  selectedProducts = selectedProducts.filter(x => String(x.id) !== String(id));
  const productDiv = document.querySelector(`.product[data-id='${id}']`);
  if(productDiv) productDiv.classList.remove('selected');
  saveCartToStorage();
  updateSelectedUI();
  renderProducts();
  if(rerenderCart) renderCartModal();
}

function toggleSelectProduct(id) {
  const existing = selectedProducts.find(x => String(x.id) === String(id));
  if(existing){
    removeFromCart(id);
  } else {
    addToCart(id);
  }
}

// обновление кнопки и счетчика выбранных
function updateSelectedUI() {
  const countSpan = document.getElementById("selectedCount");
  const totalCount = selectedProducts.reduce((sum, item) => sum + (Number(item.quantity) || 0), 0);
  countSpan.innerText = totalCount;
  countSpan.style.display = totalCount > 0 ? 'flex' : 'none';

  document.querySelectorAll('.product').forEach(card => {
    const cardId = card.dataset.id;
    const inCart = selectedProducts.some(item => String(item.id) === String(cardId));
    card.classList.toggle('selected', inCart);
  });

  if(document.getElementById('cartModal')?.style.display === 'flex'){
    renderCartModal();
  }
}

function getCartTotals() {
  return selectedProducts.reduce((acc, item) => {
    const price = Number(String(item.price).replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
    const quantity = Number(item.quantity) || 0;
    acc.count += quantity;
    acc.total += price * quantity;
    return acc;
  }, { count: 0, total: 0 });
}

function formatPrice(value){
  return `${Math.round(value)} грн`;
}

function openCartModal(){
  if(selectedProducts.length === 0) return alert('Кошик порожній');
  renderCartModal();
  document.getElementById('cartModal').style.display = 'flex';
  document.body.classList.add('no-scroll');
}

function closeCartModal(){
  document.getElementById('cartModal').style.display = 'none';
  document.body.classList.remove('no-scroll');
}

function renderCartModal(){
  const cartItems = document.getElementById('cartItems');
  const countEl = document.getElementById('cartTotalCount');
  const totalEl = document.getElementById('cartTotalPrice');

  if(!cartItems) return;

  if(selectedProducts.length === 0){
    cartItems.innerHTML = '<div style="text-align:center;padding:20px;color:#fff;">Кошик порожній</div>';
    countEl.innerText = '0';
    totalEl.innerText = '0 грн';
    return;
  }

  cartItems.innerHTML = selectedProducts.map(item => {
    const image = Array.isArray(item.image) ? item.image[0] : item.image;
    const price = Number(String(item.price).replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
    const itemTotal = price * (Number(item.quantity) || 0);
    return `
      <div class="cart-item">
        <img src="${image || ''}" alt="${item.title}">
        <div>
          <div class="cart-item-title">${item.title}</div>
          <div class="cart-item-price">${item.quantity} × ${formatPrice(price)} = ${formatPrice(itemTotal)}</div>
        </div>
        <div class="cart-qty">
          <button onclick="changeCartQuantity('${item.id}', -1)">−</button>
          <strong>${item.quantity}</strong>
          <button onclick="changeCartQuantity('${item.id}', 1)">+</button>
          <button class="cart-remove-btn" onclick="removeFromCart('${item.id}', true)">Видалити</button>
        </div>
      </div>
    `;
  }).join('');

  const totals = getCartTotals();
  countEl.innerText = totals.count;
  totalEl.innerText = formatPrice(totals.total);
}

function changeCartQuantity(id, delta){
  const item = selectedProducts.find(x => String(x.id) === String(id));
  if(!item) return;
  item.quantity = (Number(item.quantity) || 0) + delta;
  if(item.quantity <= 0){
    selectedProducts = selectedProducts.filter(x => String(x.id) !== String(id));
  }
  saveCartToStorage();
  updateSelectedUI();
  renderProducts();
  renderCartModal();
}

function clearCart(){
  if(selectedProducts.length === 0) return;
  if(!confirm('Очистити весь кошик?')) return;
  selectedProducts = [];
  saveCartToStorage();
  updateSelectedUI();
  renderProducts();
  renderCartModal();
  closeCheckoutModal();
}

function buildOrderMessage(channel){
  if(selectedProducts.length === 0){
    alert('Кошик порожній');
    return null;
  }
  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('customerPhone').value.trim();
  const city = document.getElementById('customerCity').value.trim();
  const branch = document.getElementById('customerBranch').value.trim();
  const payment = document.getElementById('paymentMethod').value.trim();
  const comment = document.getElementById('customerComment').value.trim();

  if(!name || !phone){
    alert("Вкажіть ім'я і телефон");
    return null;
  }

  const totals = getCartTotals();
  let message = `Нове замовлення (${channel})

Покупець: ${name}
Телефон: ${phone}`;
  if(city) message += `
Місто: ${city}`;
  if(branch) message += `
Нова пошта: ${branch}`;
  if(payment) message += `
Оплата: ${payment}`;
  if(comment) message += `
Коментар: ${comment}`;

  message += `

Товари:
`;
  selectedProducts.forEach(item => {
    const price = Number(String(item.price).replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
    const qty = Number(item.quantity) || 0;
    message += `• ${item.title} — ${qty} шт. × ${formatPrice(price)} = ${formatPrice(price * qty)}
`;
  });

  message += `
Всього товарів: ${totals.count}
Загальна сума: ${formatPrice(totals.total)}`;
  return message;
}

async function copyTextSafe(text){
  try {
    if(navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch(e) {}
  const temp = document.createElement('textarea');
  temp.value = text;
  document.body.appendChild(temp);
  temp.select();
  const ok = document.execCommand('copy');
  temp.remove();
  return ok;
}

async function submitOrder(channel){
  const message = buildOrderMessage(channel);
  if(!message) return;

  if(channel === 'telegram'){
    const url = `https://t.me/Fushan90?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
    return;
  }

  if(channel === 'instagram'){
    await copyTextSafe(message);
    window.open('https://www.instagram.com/inst_asortiments/', '_blank');
    alert('Текст замовлення скопійовано. Встав його в Direct Instagram.');
    return;
  }

  if(channel === 'novaposhta'){
    await copyTextSafe(message);
    alert('Дані замовлення для відправки Новою поштою скопійовано. Автоматичне створення ТТН потребує API Нової пошти.');
  }
}

// обновленный renderProducts
function renderProducts(list = products){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    const displayImage = Array.isArray(p.image) ? p.image[0] : p.image;

    const div = document.createElement('div');
    div.className = 'product';
    div.dataset.id = p.id;

    const inCart = selectedProducts.some(item => String(item.id) === String(p.id));
    if(inCart) div.classList.add('selected');

     div.innerHTML = `
   <img src="${displayImage}">
   <h4>${p.title}</h4>
   <p>${p.price} грн</p>

   <div class="card-buttons">
     <button class="order-btn">У кошик</button>
     <button class="add-btn">Швидке замовлення</button>
     ${adminMode ? `<button class="edit-btn">Редагувати</button>` : ""}
   </div>
 `;

    // кнопка редагувати
    if(adminMode){
      const editBtn = div.querySelector('.edit-btn');
      editBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        openEditModal(p.id);
      });
    }

    // кнопка замовити
    const orderBtn = div.querySelector('.order-btn');
    orderBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      orderProduct(p.id);
    });

    // кнопка додати в замовлення
    const addBtn = div.querySelector('.add-btn');
    addBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      quickOrderProduct(p.title, p.price);
    });

    // клік по картці
    div.addEventListener('click', (e) => {
      if(e.target.tagName !== 'IMG' && e.target.tagName !== 'BUTTON') {
        openViewModal(p.id);
      }
    });

    // відкриття фото
    const img = div.querySelector('img');
    img.addEventListener('click', (e)=>{
      e.stopPropagation();
      openViewModal(p.id);
    });

    container.appendChild(div);
  });
}

    Math.pow(touches[0].clientX - touches[1].clientX,2) +
    Math.pow(touches[0].clientY - touches[1].clientY,2)
  );
}

// ===== ЗАГРУЗКА ФОТО В FIREBASE STORAGE =====
async function uploadImagesToFirebase(files){

  const urls = [];

  for(const file of files){

    const fileName = Date.now() + "_" + file.name;

    const storageRef = storage.ref("products/" + fileName);

    await storageRef.put(file);

    const url = await storageRef.getDownloadURL();

    urls.push(url);

  }

  return urls;
}
